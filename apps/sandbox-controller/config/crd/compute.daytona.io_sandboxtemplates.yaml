apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxtemplates.compute.daytona.io
spec:
  group: compute.daytona.io
  names:
    kind: SandboxTemplate
    listKind: SandboxTemplateList
    plural: sandboxtemplates
    singular: sandboxtemplate
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Hash
          type: string
          jsonPath: .status.compatibilityHash
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: ["template"]
              x-kubernetes-validations:
                - rule: "self == oldSelf"
                  message: "SandboxTemplate spec is immutable"
              properties:
                template:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                compatibilityHash:
                  type: string
