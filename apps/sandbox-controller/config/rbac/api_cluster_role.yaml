apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-api
rules:
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes", "sandboxsnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes/status", "sandboxsnapshots/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
