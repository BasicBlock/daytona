apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-control-plane
  namespace: daytona-system
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/name
        operator: In
        values:
          - sandbox-controller
          - sandbox-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}
  egress:
    - {}
