arch: "default"
images:
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-arm64.img"
    arch: "aarch64"
  - location: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
    arch: "x86_64"
cpus: 4
memory: "8GiB"
disk: "80GiB"
mounts:
  - location: "/Users/paulnispel/src/playground/daytona"
    mountPoint: "/workspace/daytona"
    writable: true
provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euo pipefail
      /workspace/daytona/apps/sandbox-controller/hack/local-provider/provision-vm.sh
message: |
  Daytona sandbox local provider is ready.
  Use:
    limactl shell daytona-sandbox sudo k3s kubectl get nodes
    apps/sandbox-controller/hack/local-provider/preflight.sh daytona-sandbox
