openapi: 3.0.0
info:
  contact:
    email: support@daytona.com
    name: Daytona Platforms Inc.
    url: https://www.daytona.io
  description: Daytona AI platform API Docs
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Daytona
  version: "1.0"
servers:
- url: http://localhost:3000
paths:
  /config:
    get:
      operationId: ConfigController_getConfig
      parameters: []
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaytonaConfiguration"
          description: Daytona configuration
      summary: Get config
      tags:
      - config
  /sandbox:
    get:
      operationId: listSandboxes
      parameters:
      - description: Pagination cursor from a previous response
        explode: true
        in: query
        name: cursor
        required: false
        schema:
          type: string
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 200
          minimum: 1
          type: number
        style: form
      - description: Filter by ID prefix (case-insensitive)
        explode: true
        in: query
        name: id
        required: false
        schema:
          type: string
        style: form
      - description: Filter by name prefix (case-insensitive)
        explode: true
        in: query
        name: name
        required: false
        schema:
          type: string
        style: form
      - description: JSON encoded labels to filter by
        explode: true
        in: query
        name: labels
        required: false
        schema:
          example: "{\"label1\": \"value1\", \"label2\": \"value2\"}"
          type: string
        style: form
      - description: Include results with errored state and deleted desired state
        explode: true
        in: query
        name: includeErroredDeleted
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: List of states to filter by.
        explode: true
        in: query
        name: states
        required: false
        schema:
          items:
            $ref: "#/components/schemas/SandboxState"
          type: array
        style: form
      - description: List of snapshot names to filter by
        explode: true
        in: query
        name: snapshots
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Minimum CPU
        explode: true
        in: query
        name: minCpu
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum CPU
        explode: true
        in: query
        name: maxCpu
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Minimum memory in GiB
        explode: true
        in: query
        name: minMemoryGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum memory in GiB
        explode: true
        in: query
        name: maxMemoryGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Minimum disk space in GiB
        explode: true
        in: query
        name: minDiskGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum disk space in GiB
        explode: true
        in: query
        name: maxDiskGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Filter by recoverable status
        explode: true
        in: query
        name: isRecoverable
        required: false
        schema:
          type: boolean
        style: form
      - description: Include items created after this timestamp
        explode: true
        in: query
        name: createdAtAfter
        required: false
        schema:
          example: 2024-01-01T00:00:00Z
          format: date-time
          type: string
        style: form
      - description: Include items created before this timestamp
        explode: true
        in: query
        name: createdAtBefore
        required: false
        schema:
          example: 2024-12-31T23:59:59Z
          format: date-time
          type: string
        style: form
      - description: Include items with last event after this timestamp
        explode: true
        in: query
        name: lastEventAfter
        required: false
        schema:
          example: 2024-01-01T00:00:00Z
          format: date-time
          type: string
        style: form
      - description: Include items with last event before this timestamp
        explode: true
        in: query
        name: lastEventBefore
        required: false
        schema:
          example: 2024-12-31T23:59:59Z
          format: date-time
          type: string
        style: form
      - description: Field to sort by
        explode: true
        in: query
        name: sort
        required: false
        schema:
          $ref: "#/components/schemas/SandboxListSortField"
        style: form
      - description: Direction to sort by
        explode: true
        in: query
        name: order
        required: false
        schema:
          $ref: "#/components/schemas/SandboxListSortDirection"
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListSandboxesResponse"
          description: ""
      summary: List sandboxes
      tags:
      - sandbox
    post:
      operationId: createSandbox
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSandbox"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Sandbox"
          description: ""
      summary: Create a new sandbox
      tags:
      - sandbox
  /sandbox/paginated:
    get:
      deprecated: true
      operationId: listSandboxesPaginated_deprecated
      parameters:
      - description: Page number of the results
        explode: true
        in: query
        name: page
        required: false
        schema:
          default: 1
          minimum: 1
          type: number
        style: form
      - description: Number of results per page
        explode: true
        in: query
        name: limit
        required: false
        schema:
          default: 100
          maximum: 200
          minimum: 1
          type: number
        style: form
      - description: Filter by partial ID match
        explode: true
        in: query
        name: id
        required: false
        schema:
          example: abc123
          type: string
        style: form
      - description: Filter by partial name match
        explode: true
        in: query
        name: name
        required: false
        schema:
          example: abc123
          type: string
        style: form
      - description: JSON encoded labels to filter by
        explode: true
        in: query
        name: labels
        required: false
        schema:
          example: "{\"label1\": \"value1\", \"label2\": \"value2\"}"
          type: string
        style: form
      - description: Include results with errored state and deleted desired state
        explode: true
        in: query
        name: includeErroredDeleted
        required: false
        schema:
          default: false
          type: boolean
        style: form
      - description: List of states to filter by
        explode: true
        in: query
        name: states
        required: false
        schema:
          items:
            enum:
            - creating
            - restoring
            - destroying
            - started
            - stopped
            - starting
            - stopping
            - error
            - build_failed
            - pending_build
            - building_snapshot
            - unknown
            - pulling_snapshot
            - archived
            - archiving
            - resizing
            - snapshotting
            - forking
            - pausing
            - paused
            - resuming
            type: string
          type: array
        style: form
      - description: List of snapshot names to filter by
        explode: true
        in: query
        name: snapshots
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: List of targets to filter by
        explode: true
        in: query
        name: targets
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      - description: Minimum CPU
        explode: true
        in: query
        name: minCpu
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum CPU
        explode: true
        in: query
        name: maxCpu
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Minimum memory in GiB
        explode: true
        in: query
        name: minMemoryGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum memory in GiB
        explode: true
        in: query
        name: maxMemoryGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Minimum disk space in GiB
        explode: true
        in: query
        name: minDiskGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Maximum disk space in GiB
        explode: true
        in: query
        name: maxDiskGiB
        required: false
        schema:
          minimum: 1
          type: number
        style: form
      - description: Include items with last event after this timestamp
        explode: true
        in: query
        name: lastEventAfter
        required: false
        schema:
          example: 2024-01-01T00:00:00Z
          format: date-time
          type: string
        style: form
      - description: Include items with last event before this timestamp
        explode: true
        in: query
        name: lastEventBefore
        required: false
        schema:
          example: 2024-12-31T23:59:59Z
          format: date-time
          type: string
        style: form
      - description: Field to sort by
        explode: true
        in: query
        name: sort
        required: false
        schema:
          default: createdAt
          enum:
          - id
          - name
          - state
          - snapshot
          - target
          - updatedAt
          - createdAt
          - lastActivityAt
          type: string
        style: form
      - description: Direction to sort by
        explode: true
        in: query
        name: order
        required: false
        schema:
          default: desc
          enum:
          - asc
          - desc
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSandboxes_deprecated"
          description: ""
      summary: "[DEPRECATED] List all sandboxes paginated"
      tags:
      - sandbox
