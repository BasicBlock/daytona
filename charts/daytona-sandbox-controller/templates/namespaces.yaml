{{- if .Values.namespaces.create }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.systemNamespace | quote }}
  labels:
    {{- include "daytona-sandbox-controller.labels" . | nindent 4 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sandboxNamespace | quote }}
  labels:
    {{- include "daytona-sandbox-controller.labels" . | nindent 4 }}
{{- end }}
