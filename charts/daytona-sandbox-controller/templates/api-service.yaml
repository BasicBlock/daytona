apiVersion: v1
kind: Service
metadata:
  name: sandbox-api
  namespace: {{ .Values.systemNamespace | quote }}
  labels:
    {{- include "daytona-sandbox-controller.apiLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "daytona-sandbox-controller.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
