apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-api
  namespace: {{ .Values.systemNamespace | quote }}
  labels:
    {{- include "daytona-sandbox-controller.apiLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "daytona-sandbox-controller.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "daytona-sandbox-controller.apiLabels" . | nindent 8 }}
    spec:
      serviceAccountName: sandbox-api
      containers:
        - name: api
          image: {{ include "daytona-sandbox-controller.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /sandbox-api
          args:
            - --listen=:8090
            - --namespace=$(SANDBOX_NAMESPACE)
            - --public-base-url=$(DAYTONA_PUBLIC_BASE_URL)
          env:
            - name: SANDBOX_NAMESPACE
              value: {{ .Values.sandboxNamespace | quote }}
            - name: DAYTONA_PUBLIC_BASE_URL
              value: {{ .Values.api.publicBaseUrl | quote }}
          ports:
            - name: http
              containerPort: 8090
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
