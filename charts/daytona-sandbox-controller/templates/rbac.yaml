apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-controller
  labels:
    {{- include "daytona-sandbox-controller.controllerLabels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes", "sandboxsnapshots", "sandboxtemplates", "localrunscsnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes/status", "sandboxsnapshots/status", "sandboxtemplates/status", "localrunscsnapshots/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes/finalizers", "sandboxsnapshots/finalizers", "sandboxtemplates/finalizers", "localrunscsnapshots/finalizers"]
    verbs: ["update"]
  - apiGroups: ["podsnapshot.gke.io"]
    resources: ["podsnapshotstorageconfigs", "podsnapshotpolicies", "podsnapshotmanualtriggers", "podsnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["podsnapshot.gke.io"]
    resources: ["podsnapshotmanualtriggers/status", "podsnapshots/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-controller
  labels:
    {{- include "daytona-sandbox-controller.controllerLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-controller
subjects:
  - kind: ServiceAccount
    name: sandbox-controller
    namespace: {{ .Values.systemNamespace | quote }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sandbox-api
  labels:
    {{- include "daytona-sandbox-controller.apiLabels" . | nindent 4 }}
rules:
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes", "sandboxsnapshots"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["compute.daytona.io"]
    resources: ["sandboxes/status", "sandboxsnapshots/status"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sandbox-api
  labels:
    {{- include "daytona-sandbox-controller.apiLabels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sandbox-api
subjects:
  - kind: ServiceAccount
    name: sandbox-api
    namespace: {{ .Values.systemNamespace | quote }}
