apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxes.compute.daytona.io
spec:
  group: compute.daytona.io
  names:
    kind: Sandbox
    listKind: SandboxList
    plural: sandboxes
    singular: sandbox
    shortNames:
      - sbox
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Pod
          type: string
          jsonPath: .status.podName
        - name: Service
          type: string
          jsonPath: .status.serviceName
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - image
              properties:
                desiredState:
                  type: string
                  enum: ["Running", "Stopped"]
                templateName:
                  type: string
                image:
                  type: string
                  minLength: 1
                command:
                  type: array
                  items:
                    type: string
                args:
                  type: array
                  items:
                    type: string
                env:
                  type: array
                  x-kubernetes-preserve-unknown-fields: true
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
                ports:
                  type: array
                  items:
                    type: object
                    required: ["name", "port"]
                    properties:
                      name:
                        type: string
                      port:
                        type: integer
                        format: int32
                        minimum: 1
                        maximum: 65535
                      protocol:
                        type: string
                        enum: ["TCP", "UDP", "SCTP"]
                volumes:
                  type: array
                  items:
                    type: object
                    required: ["name", "mountPath"]
                    properties:
                      name:
                        type: string
                      mountPath:
                        type: string
                      readOnly:
                        type: boolean
                      emptyDir:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      persistentVolumeClaim:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                runtimeClassName:
                  type: string
                serviceAccountName:
                  type: string
                toolbox:
                  type: object
                  properties:
                    image:
                      type: string
                    port:
                      type: integer
                      format: int32
                      minimum: 1
                      maximum: 65535
                    resources:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                access:
                  type: object
                  properties:
                    sshEnabled:
                      type: boolean
                    routeBaseUrl:
                      type: string
                    credentialVersion:
                      type: string
                stopPolicy:
                  type: object
                  properties:
                    snapshotBeforeStop:
                      type: boolean
                    snapshotName:
                      type: string
                    provider:
                      type: string
                      enum: ["GKEPodSnapshot", "LocalRunsc"]
                    gke:
                      type: object
                      properties:
                        storageConfigName:
                          type: string
                        storage:
                          type: object
                          properties:
                            bucket:
                              type: string
                            path:
                              type: string
                            tokenSource:
                              type: string
                        postCheckpoint:
                          type: string
                          enum: ["resume", "stop"]
                        retention:
                          type: string
                    local:
                      type: object
                      properties:
                        storage:
                          type: object
                          properties:
                            mode:
                              type: string
                            path:
                              type: string
                            endpoint:
                              type: string
                            bucket:
                              type: string
                            prefix:
                              type: string
                networkPolicy:
                  type: object
                  properties:
                    enabled:
                      type: boolean
                    allowDNS:
                      type: boolean
                    egressCIDRs:
                      type: array
                      items:
                        type: string
                secrets:
                  type: object
                  properties:
                    provider:
                      type: string
                      enum: ["doppler"]
                    dopplerProject:
                      type: string
                    dopplerConfig:
                      type: string
                    managedSecretName:
                      type: string
                scheduling:
                  type: object
                  properties:
                    nodeSelector:
                      type: object
                      additionalProperties:
                        type: string
                    tolerations:
                      type: array
                      x-kubernetes-preserve-unknown-fields: true
                      items:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    affinity:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                restore:
                  type: object
                  required: ["name"]
                  properties:
                    name:
                      type: string
                    provider:
                      type: string
                      enum: ["GKEPodSnapshot", "LocalRunsc"]
                    providerObjectName:
                      type: string
                    storageRef:
                      type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                podName:
                  type: string
                serviceName:
                  type: string
                specHash:
                  type: string
                restoredSnapshot:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
