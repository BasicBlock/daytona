apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: sandboxsnapshots.compute.daytona.io
spec:
  group: compute.daytona.io
  names:
    kind: SandboxSnapshot
    listKind: SandboxSnapshotList
    plural: sandboxsnapshots
    singular: sandboxsnapshot
    shortNames:
      - sbsnap
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Phase
          type: string
          jsonPath: .status.phase
        - name: Source
          type: string
          jsonPath: .spec.source.sandboxName
        - name: ProviderObject
          type: string
          jsonPath: .status.providerObjectName
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - source
              properties:
                provider:
                  type: string
                  enum: ["GKEPodSnapshot", "LocalRunsc"]
                source:
                  type: object
                  required: ["sandboxName"]
                  properties:
                    sandboxName:
                      type: string
                gke:
                  type: object
                  properties:
                    storageConfigName:
                      type: string
                    storage:
                      type: object
                      properties:
                        bucket:
                          type: string
                        path:
                          type: string
                        tokenSource:
                          type: string
                    postCheckpoint:
                      type: string
                      enum: ["resume", "stop"]
                    retention:
                      type: string
                local:
                  type: object
                  properties:
                    storage:
                      type: object
                      properties:
                        mode:
                          type: string
                        path:
                          type: string
                        endpoint:
                          type: string
                        bucket:
                          type: string
                        prefix:
                          type: string
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                phase:
                  type: string
                providerObjectName:
                  type: string
                policyName:
                  type: string
                triggerName:
                  type: string
                sourcePodName:
                  type: string
                templateName:
                  type: string
                compatibilityHash:
                  type: string
                storageRef:
                  type: string
                error:
                  type: string
                conditions:
                  type: array
                  items:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
