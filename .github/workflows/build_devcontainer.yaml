name: 'Build devcontainer image'
on:
  push:
    branches:
      - main

permissions: {}

env:
  PROJECT_ID: basicblock
  GAR_LOCATION: us-central1
  WORKLOAD_IDENTITY_PROVIDER: projects/327281795986/locations/global/workloadIdentityPools/github-pool/providers/basicblock-repo

jobs:
  build:
    if: github.repository == 'BasicBlock/daytona'
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout (GitHub)
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Set up QEMU for multi-architecture builds
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@ab5c1da94f53f5cd75c1038092aa276dddfccbba # v1.9.0
      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          token_format: access_token
          service_account: githubactions@basicblock.iam.gserviceaccount.com
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Docker Auth
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - name: Build and release devcontainer Multi-Platform
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca # v0.3
        env:
          # see: https://github.com/devcontainers/ci/issues/191#issuecomment-1603857155
          BUILDX_NO_DEFAULT_ATTESTATIONS: true
        with:
          imageName: us-central1-docker.pkg.dev/basicblock/docker-images/daytona-devcontainer
          cacheFrom: us-central1-docker.pkg.dev/basicblock/docker-images/daytona-devcontainer
          platform: linux/amd64,linux/arm64
          imageTag: main,latest
          configFile: .devcontainer/devcontainer.build.json
