name: '[PR] Docker build'

on:
  pull_request:

permissions:
  contents: read

env:
  BUILDX_NO_DEFAULT_ATTESTATIONS: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    if: github.repository == 'BasicBlock/daytona' && github.event.pull_request.head.repo.full_name == github.repository
    name: Docker build
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      VERSION: v0.0.0-pr
      NX_DAEMON: 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up toolchain
        uses: ./.github/actions/setup-toolchain
        with:
          install-java: 'false'
          install-swag: 'false'

      - name: Ensure go.work.sum exists
        # The composite runs `go work sync` but does not `touch go.work.sum`.
        # When sync has nothing to write, the file is not created, and the Go
        # Dockerfiles' `COPY go.work go.work.sum` fails. Matches release.yaml:270.
        run: touch go.work.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build all Docker targets
        # sandbox, sandbox-slim and sandbox-gpu excluded: sandbox/sandbox-slim's base
        # mcr.microsoft.com/devcontainers/python is anonymous-pulled from GHA runners and
        # flakes with 403 Forbidden; sandbox-gpu builds FROM the sandbox image (large, GPU
        # oriented, amd64-only). Sandbox image validation happens in the default image
        # publish workflow on release dispatch.
        run: |
          yarn nx run-many \
            --target=docker \
            --configuration=pr-build \
            --exclude=sandbox,sandbox-slim,sandbox-gpu \
            --parallel=2 \
            --nxBail=true
